<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#gradient)" stroke="#fff" stroke-width="2"/>
  
  <!-- Film reel design -->
  <circle cx="50" cy="50" r="35" fill="none" stroke="#fff" stroke-width="3"/>
  <circle cx="50" cy="50" r="25" fill="none" stroke="#fff" stroke-width="2"/>
  
  <!-- Film holes -->
  <circle cx="50" cy="20" r="4" fill="#fff"/>
  <circle cx="50" cy="80" r="4" fill="#fff"/>
  <circle cx="20" cy="50" r="4" fill="#fff"/>
  <circle cx="80" cy="50" r="4" fill="#fff"/>
  <circle cx="65" cy="35" r="3" fill="#fff"/>
  <circle cx="35" cy="35" r="3" fill="#fff"/>
  <circle cx="65" cy="65" r="3" fill="#fff"/>
  <circle cx="35" cy="65" r="3" fill="#fff"/>
  
  <!-- Center play button -->
  <polygon points="42,40 42,60 62,50" fill="#fff"/>
</svg>
